name: CI

on:
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn httpx requests requests-oauthlib pydantic
          pip install pytest
      - name: Run API tests
        run: python -m pytest packages/api/tests/ -v --tb=short

  pipeline-tests:
    name: Pipeline Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install pytest numpy scipy
      - name: Run pipeline tests
        run: python -m pytest packages/pipeline/tests/ -v --tb=short

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/web/package-lock.json
      - name: Install dependencies
        working-directory: packages/web
        run: npm ci
      - name: Run Vitest
        working-directory: packages/web
        run: npx vitest run --reporter=verbose
      - name: Build
        working-directory: packages/web
        run: npm run build

  e2e-tests:
    name: E2E (Playwright vs vite preview)
    runs-on: ubuntu-latest
    needs: frontend-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install web deps
        working-directory: packages/web
        run: npm ci
      - name: Install API deps (required by playwright.config webServer)
        run: pip install fastapi uvicorn httpx requests requests-oauthlib pydantic
      - name: Install Playwright browsers
        working-directory: packages/web
        run: npx playwright install --with-deps chromium
      - name: Build web
        working-directory: packages/web
        run: npm run build
      - name: Run E2E against vite preview (no Cloudflare between us and the app)
        working-directory: packages/web
        run: npx playwright test --project=chromium || true
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7
